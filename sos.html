<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency SOS - Women Safety</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="gradient-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/dashboard">
            🚨 Women Safety
        </a>

        <div>
            <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 p-5 text-center sos-card">

                <h2 class="fw-bold text-danger mb-4">
                    🚨 EMERGENCY SOS ALERT
                </h2>

                <p class="text-muted mb-4">
                    Press the button below to send emergency alert with your location
                    to your saved emergency contacts.
                </p>

                <!-- SOS FORM -->
                <form method="POST" action="/sos_page">

                    <button class="btn btn-danger btn-lg px-5 py-3 sos-btn">
                        SEND SOS
                    </button>

                </form>

                <p class="mt-4 text-muted small">
                    This will notify your emergency contacts instantly.
                </p>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="text-center text-white pb-3">
    Women Safety System © 2026
</footer>

<script src="/static/script.js"></script>

</body>
</html>
