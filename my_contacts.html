<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Contacts - Women Safety</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="gradient-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">

        <span class="navbar-brand fw-bold">
            📞 My Emergency Contacts
        </span>

        <div>
            <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container py-5">

    <div class="card shadow-lg border-0 p-4 history-card">

        <h3 class="text-center mb-4 fw-bold">
            Saved Contacts
        </h3>

        <div class="table-responsive">

            <table class="table table-striped table-hover table-bordered text-center">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    {% if contacts %}
                        {% for c in contacts %}
                        <tr>
                            <td>{{ c.id }}</td>
                            <td>{{ c.name }}</td>
                            <td>{{ c.phone }}</td>

                            <td>
                                <a href="/delete_contact/{{ c.id }}" 
                                   class="btn btn-danger btn-sm">
                                   Delete
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4">No Contacts Found</td>
                        </tr>
                    {% endif %}

                </tbody>

            </table>

        </div>

    </div>

</div>

<footer class="text-center text-white pb-3">
    Women Safety System © 2026
</footer>

</body>
</html>
