<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5">

    <title>Add Emergency Contacts</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="gradient-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/dashboard">
            🚨 Women Safety
        </a>

        <div>
            <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 p-4 contact-card">

                <h3 class="text-center mb-4 fw-bold">
                    ➕ Add Emergency Contact
                </h3>

                <!-- CONTACT FORM -->
                <form method="POST" action="/add_contacts">

                    <!-- NAME -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contact Name</label>
                        <input 
                            type="text" 
                            name="name" 
                            class="form-control form-control-lg"
                            placeholder="Enter Contact Name"
                            required>
                    </div>

                    <!-- PHONE -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input 
                            type="text" 
                            name="phone" 
                            class="form-control form-control-lg"
                            placeholder="Enter Phone Number"
                            required>
                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid">
                        <button class="btn btn-success btn-lg">
                            Save Contact
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="text-center text-white pb-3">
    Women Safety System © 2026
</footer>

<script src="/static/script.js"></script>


</body>
</html>
