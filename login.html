<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Women Safety</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="gradient-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚨 Women Safety
        </a>

        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
            <a href="/register" class="btn btn-primary btn-sm">Register</a>
        </div>

    </div>
</nav>

<!-- LOGIN SECTION -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg border-0 p-5 login-card">

                <h3 class="text-center mb-4 fw-bold">
                    🔐 User Login
                </h3>

                <form method="POST" action="/login">

                    <!-- EMAIL -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input 
                            type="email" 
                            name="email" 
                            class="form-control form-control-lg"
                            placeholder="Enter your email"
                            required>
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            class="form-control form-control-lg"
                            placeholder="Enter your password"
                            required>
                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid">
                        <button class="btn btn-success btn-lg">
                            Login
                        </button>
                    </div>

                </form>

                <!-- EXTRA LINKS -->
                <div class="text-center mt-4">
                    <small>
                        New user?
                        <a href="/register" class="fw-bold">Create Account</a>
                    </small>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="text-center text-white pb-3">
    Women Safety System © 2026
</footer>

<script src="/static/script.js"></script>

</body>
</html>
